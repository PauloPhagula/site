---
# Based on https://github.com/actions/starter-workflows/blob/main/pages/jekyll.yml
name: Pipeline

on:
  # Runs on pushes targeting the main branch
  push:
    branches:
      - main
  # Allows you to run workflow manually from the actions tab
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10
          run_install: false
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1
        with:
          ruby-version: '3.3'  # Not needed with a .ruby-version file
          bundler-cache: true  # runs 'bundle install' and caches installed gems automatically
          cache-version: 1  # Increment this number if you need to re-download cache gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5
        if: github.ref == 'refs/heads/main'
      - name: Build with Gulp
        # Outputs to the '/_site' directory
        run: pnpm exec gulp build
        env:
          JEKYLL_ENV: production
      - name: Upload Artifact
        # Automatically uploads an artifact from the '/_site' directory
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4
        if: github.ref == 'refs/heads/main'
  # Deployment job
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-slim
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
